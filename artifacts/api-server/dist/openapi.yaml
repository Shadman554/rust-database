              items:
                $ref: "#/components/schemas/Slide"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/Note"
            normalRanges:
              type: array
              items:
                $ref: "#/components/schemas/NormalRange"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - query
        - type
        - results
        - pagination
