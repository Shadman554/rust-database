    # --- NORMAL RANGE ---
    NormalRange:
      type: object
      properties:
        id:
          type: integer
        parameter:
          type: string
        species:
          type: string
        category:
          type: ["string", "null"]
        minValue:
          type: ["number", "null"]
        maxValue:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - parameter
        - species
        - createdAt
        - updatedAt

    CreateNormalRangeBody:
      type: object
      properties:
        parameter:
          type: string
        species:
          type: string
        category:
          type: string
        minValue:
          type: number
        maxValue:
          type: number
        unit:
          type: string
        description:
          type: string
      required:
        - parameter
        - species

    PaginatedNormalRanges:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NormalRange"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination

    # --- CEO ---
    Ceo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        viberUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - displayOrder
        - createdAt
        - updatedAt

    CreateCeoBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        description:
          type: string
        color:
          type: string
        imageUrl:
          type: string
        facebookUrl:
          type: string
        viberUrl:
          type: string
        displayOrder:
          type: integer
