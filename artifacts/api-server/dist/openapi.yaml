    # --- UPLOAD ---
    UploadResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
      required:
        - url
        - filename

    # --- SEARCH ---
    SearchResults:
      type: object
      properties:
        query:
          type: string
        type:
          type: string
        results:
          type: object
          properties:
            dictionary:
              type: array
              items:
                $ref: "#/components/schemas/Word"
            diseases:
              type: array
              items:
                $ref: "#/components/schemas/Disease"
            drugs:
              type: array
              items:
                $ref: "#/components/schemas/Drug"
            books:
