    # --- SUPPORTER ---
    Supporter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - displayOrder
        - createdAt
        - updatedAt

    CreateSupporterBody:
      type: object
      properties:
