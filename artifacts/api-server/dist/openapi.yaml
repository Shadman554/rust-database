        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"

  /about/supporters/{id}:
    put:
      operationId: updateSupporter
      tags: [about]
      summary: Update a supporter entry
      security:
        - BearerAuth: []
