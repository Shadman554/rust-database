      required:
        - items
        - pagination

    # --- INSTRUMENT ---
    Instrument:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        usage:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        createdAt:
          type: string
