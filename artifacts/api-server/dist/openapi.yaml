        items:
          type: array
          items:
            $ref: "#/components/schemas/Disease"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination

    # --- DRUG ---
    Drug:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        usage:
          type: ["string", "null"]
        sideEffect:
          type: ["string", "null"]
        otherInfo:
          type: ["string", "null"]
        drugClass:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateDrugBody:
      type: object
      properties:
        name:
          type: string
        usage:
          type: string
        sideEffect:
          type: string
        otherInfo:
          type: string
        drugClass:
          type: string
      required:
