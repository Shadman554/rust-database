openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VetStan Veterinary Dictionary Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dictionary
    description: Dictionary/Terminology
  - name: diseases
    description: Diseases
  - name: drugs
    description: Drugs
  - name: books
    description: Books
  - name: instruments
    description: Instruments
  - name: tests
    description: Laboratory Tests
  - name: slides
    description: Microscopy Slides
  - name: notes
    description: Notes
  - name: normalRanges
    description: Normal Ranges
  - name: about
    description: About page (CEOs & Supporters)
  - name: upload
    description: File upload
  - name: search
    description: Global search

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH ---
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
