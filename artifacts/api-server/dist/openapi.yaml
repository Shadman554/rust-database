  # --- UPLOAD ---
  /upload/image:
    post:
      operationId: uploadImage
      tags: [upload]
      summary: Upload an image file
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  # --- SEARCH ---
  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search across all modules
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [dictionary, diseases, drugs, books, instruments, tests, slides, notes, normalRanges, all]
            default: all
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    SearchParam:
      name: q
      in: query
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer
      required:
        - page
        - limit
        - total
        - pages

    # --- AUTH ---
    RegisterBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        firstName:
          type: string
        lastName:
          type: string
      required:
        - username
        - email
        - password

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - role
        - isActive
        - createdAt
        - updatedAt

    # --- DICTIONARY ---
    Word:
      type: object
      properties:
        id:
          type: integer
        word:
          type: string
        kurdishMeaning:
          type: string
        category:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - word
        - kurdishMeaning
        - createdAt
        - updatedAt

    CreateWordBody:
      type: object
      properties:
        word:
          type: string
        kurdishMeaning:
          type: string
        category:
          type: string
      required:
        - word
        - kurdishMeaning

    PaginatedWords:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Word"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination

    # --- DISEASE ---
    Disease:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        kurdish:
          type: ["string", "null"]
        symptoms:
          type: ["string", "null"]
        cause:
          type: ["string", "null"]
        control:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateDiseaseBody:
      type: object
      properties:
        name:
          type: string
        kurdish:
          type: string
        symptoms:
          type: string
        cause:
          type: string
        control:
          type: string
      required:
        - name

    PaginatedDiseases:
      type: object
