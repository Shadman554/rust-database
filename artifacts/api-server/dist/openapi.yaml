    PaginatedTests:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Test"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - items
        - pagination

    # --- SLIDE ---
    Slide:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        species:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        category:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
